<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fikstür</title>

  <style>
    body {
      font-family: "Inter", sans-serif;
      background-color: #111;
      color: #eaeaea;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 25px;
    }

    h2 {
      margin: 30px 0 10px;
      font-size: 18px;
    }

    #tables-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    .table-wrapper {
      width: 100%;
      max-width: 800px;
      overflow-x: auto;
    }

    table {
      table-layout: fixed;
      border-collapse: collapse;
      width: 100%;
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #333;
      text-align: center;
      width: 25%;
    }

    th {
      background: #222;
      color: #ccc;
      font-size: 12px;
      text-transform: uppercase;
    }

    td {
      color: #ddd;
      font-size: 13px;
    }

    tr:nth-child(even) {
      background: #181818;
    }

    tr:hover {
      background: #2a2a2a;
    }
  </style>
</head>

<body>

<h1>IFL FİKSTÜR</h1>
<div id="tables-container">Yükleniyor...</div>

<script>
const sheetId = "BURAYA_SHEET_ID";
const gid = "0";

const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

/* SINIF ARALIKLARI (kendine göre değiştir) */
const ranges = {
  "9/A": { startRow: 2, endRow: 7, startCol: 1, endCol: 4 },
  "9/B": { startRow: 2, endRow: 7, startCol: 6, endCol: 9 },
  "10/A": { startRow: 10, endRow: 15, startCol: 1, endCol: 4 },
  "10/B": { startRow: 10, endRow: 15, startCol: 6, endCol: 9 }
};

async function loadTables() {
  try {
    const res = await fetch(csvUrl);
    const text = await res.text();

    const rows = text.split("\n").map(r => r.split(","));

    const container = document.getElementById("tables-container");
    container.innerHTML = "";

    Object.keys(ranges).forEach(className => {

      const r = ranges[className];

      const subRows = rows
        .slice(r.startRow - 1, r.endRow)
        .map(row => row.slice(r.startCol - 1, r.endCol));

      const title = document.createElement("h2");
      title.textContent = className;
      container.appendChild(title);

      const wrapper = document.createElement("div");
      wrapper.className = "table-wrapper";

      const table = document.createElement("table");

      /* SABİT BAŞLIK */
      const headers = ["Tarih", "Ev Sahibi", "Deplasman", "Skor"];

      const thead = document.createElement("thead");
      const trHead = document.createElement("tr");

      headers.forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        trHead.appendChild(th);
      });

      thead.appendChild(trHead);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      subRows.forEach(row => {

        if (row.every(cell => cell.trim() === "")) return;

        const tr = document.createElement("tr");

        row.forEach(cell => {
          const td = document.createElement("td");
          td.textContent = cell.trim();
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      wrapper.appendChild(table);
      container.appendChild(wrapper);
    });

  } catch (err) {
    document.getElementById("tables-container").innerHTML =
      "⚠️ Veri alınamadı: " + err.message;
  }
}

loadTables();
setInterval(loadTables, 60000);
</script>

</body>
</html>
