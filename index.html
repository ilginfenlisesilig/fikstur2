<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fikstür</title>

<style>
body {
  font-family: "Inter", sans-serif;
  background: #111;
  color: #eee;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.table-wrapper {
  max-width: 900px;
  margin: auto;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1a1a1a;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #333;
  text-align: center;
}

th {
  background: #222;
  color: #ccc;
  text-transform: uppercase;
}

tr:nth-child(even) {
  background: #181818;
}

tr:hover {
  background: #2a2a2a;
}
</style>
</head>

<body>

<h1>IFL FİKSTÜR</h1>

<div class="table-wrapper">
  <table id="table">
    <thead>
      <tr>
        <th>Tarih</th>
        <th>Ev Sahibi</th>
        <th>Deplasman</th>
        <th>Skor</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const sheetId = "1u_61M8yOpSrLxKZ_H7edc6U75cpYSa5BOscC9t85FEw";
const gid = "0";

const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

async function loadData() {
  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));

  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  // ilk satırı atlıyoruz (header varsa)
  rows.slice(1).forEach(row => {

    // boş satır skip
    if (row.length < 4 || row.every(c => c.trim() === "")) return;

    const tr = document.createElement("tr");

    for (let i = 0; i < 4; i++) {
      const td = document.createElement("td");
      td.textContent = (row[i] || "").trim();
      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  });
}

loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
